<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#585b70" stroke="#7f849c" stroke-width="1"/>
  
  <!-- Bank building -->
  <rect x="6" y="16" width="20" height="10" fill="#313244" stroke="#45475a" stroke-width="0.3"/>
  
  <!-- Columns (simplified) -->
  <rect x="7" y="11" width="1.5" height="5" fill="#45475a"/>
  <rect x="10" y="11" width="1.5" height="5" fill="#45475a"/>
  <rect x="13" y="11" width="1.5" height="5" fill="#45475a"/>
  <rect x="16" y="11" width="1.5" height="5" fill="#45475a"/>
  <rect x="19" y="11" width="1.5" height="5" fill="#45475a"/>
  <rect x="22" y="11" width="1.5" height="5" fill="#45475a"/>
  <rect x="25" y="11" width="1.5" height="5" fill="#45475a"/>
  
  <!-- Roof -->
  <polygon points="5,11 16,6 27,11 26,10 16,5 6,10" fill="#89b4fa"/>
  
  <!-- Door -->
  <rect x="13" y="18" width="6" height="6" fill="#1e1e2e" stroke="#89b4fa" stroke-width="0.3"/>
  
  <!-- Windows -->
  <rect x="8" y="19" width="2.5" height="2.5" fill="#89dceb" opacity="0.7"/>
  <rect x="21.5" y="19" width="2.5" height="2.5" fill="#89dceb" opacity="0.7"/>
  <rect x="8" y="22.5" width="2.5" height="2.5" fill="#89dceb" opacity="0.7"/>
  <rect x="21.5" y="22.5" width="2.5" height="2.5" fill="#89dceb" opacity="0.7"/>
  
  <!-- Steps -->
  <rect x="7" y="26" width="18" height="0.8" fill="#585b70"/>
  <rect x="8" y="25" width="16" height="0.8" fill="#6c7086"/>
</svg>
